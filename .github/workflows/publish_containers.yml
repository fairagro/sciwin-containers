name: Publish Multi-Image to GHCR

on:
  release:
    types: [published]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          # Find all Dockerfiles, exclude the root directory (.), 
          # get the parent directory, and create a JSON array
          folders=$(find . -name "Dockerfile" -not -path "./Dockerfile" -printf '%h\n' | sed 's|^\./||' | jq -R . | jq -s -c .)
          echo "matrix=$folders" >> $GITHUB_OUTPUT

  build-and-push:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: ${{ fromJson(needs.setup.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.folder }}/Dockerfile
          push: true
          tags: |
            sciwin/${{ matrix.folder }}:${{ github.event.release.tag_name }}
            sciwin/${{ matrix.folder }}:latest