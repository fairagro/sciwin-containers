name: Publish Multi-Image to GHCR

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          # Find all Dockerfiles, get their directory, and create a JSON array
          # e.g., ["frontend", "backend"]
          folders=$(find . -name "Dockerfile" -printf '%h\n' | cut -d/ -f2- | jq -R . | jq -s -c .)
          echo "matrix=$folders" >> $GITHUB_OUTPUT

  build-and-push:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: ${{ fromJson(needs.setup.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.folder }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sciwin/${{ matrix.folder }}:${{ github.event.release.tag_name }}
      
      - name: Set image visibility to public
        run: |
          gh api -X PATCH /user/packages/container/${{ matrix.folder }}/visibility \
            -f visibility=public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}